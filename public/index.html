<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Tra Cứu Mã Vận Đơn Tự Động 24/7</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0b0f19;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #06b6d4;
      --primary-hover: #0891b2;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--card-border);
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--success));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 14px rgba(6, 182, 212, 0.35);
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text p {
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--success);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }

    .section-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-input {
      flex: 1;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text-main);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--primary);
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    #trackResult {
      display: none;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(6, 182, 212, 0.3);
      border-radius: 14px;
      padding: 20px;
      margin-top: 16px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 16px;
    }

    .result-badge {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }

    .timeline-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      position: relative;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 20px;
      bottom: -12px;
      width: 2px;
      background: var(--card-border);
    }

    .timeline-item:last-child::before {
      display: none;
    }

    .timeline-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      margin-top: 3px;
      flex-shrink: 0;
      box-shadow: 0 0 8px var(--primary);
    }

    .timeline-content h4 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
    }

    .timeline-content p {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-box">
        <div class="logo-icon">🚚</div>
        <div class="logo-text">
          <h1>Hệ Thống Tra Cứu Mã Vận Đơn Tự Động</h1>
          <p>Tra Cứu & Theo Dõi Bưu Kiện Đa Kênh Công Khai (SPX, GHTK, GHN...)</p>
        </div>
      </div>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span>HỆ THỐNG ĐANG HOẠT ĐỘNG 24/7</span>
      </div>
    </header>

    <!-- Live Waybill Tracker -->
    <div class="section-card">
      <div class="section-title">
        <span>🔍</span> Tra Cứu Hành Trình Mã Vận Đơn Trực Tiếp
      </div>
      <div class="search-bar">
        <input type="text" id="trackInput" class="search-input" placeholder="Nhập Mã Vận Đơn (VD: SPXVN068554112737)..." />
        <button class="btn" onclick="doTrack()">
          <span>🔍</span> Tra Cứu Ngay
        </button>
      </div>

      <div id="trackResult">
        <div class="result-header">
          <div>
            <h3 id="resNo" style="font-size: 16px; font-weight: 700;">-</h3>
            <p id="resCarrier" style="font-size: 13px; color: var(--text-muted);">-</p>
          </div>
          <div class="result-badge" id="resStatus">-</div>
        </div>
        <div class="timeline" id="timelineList"></div>
      </div>
    </div>
  </div>

  <script>
    async function doTrack() {
      const code = document.getElementById('trackInput').value.trim();
      if (!code) return alert('Vui lòng nhập Mã vận đơn!');

      const resBox = document.getElementById('trackResult');
      resBox.style.display = 'block';
      document.getElementById('resNo').innerText = code;
      document.getElementById('resCarrier').innerText = 'Đang kiểm tra...';
      document.getElementById('resStatus').innerText = '⏳ Đang quét';
      document.getElementById('timelineList').innerHTML = '<p style="color: var(--text-muted);">Hệ thống đang kiểm tra dịch vụ vận chuyển...</p>';

      try {
        const res = await fetch('/api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ trackingNo: code })
        });
        const data = await res.json();

        if (data.success) {
          document.getElementById('resNo').innerText = data.trackingNo;
          document.getElementById('resCarrier').innerText = data.carrier || 'Đơn vị vận chuyển';
          document.getElementById('resStatus').innerText = data.status;

          if (data.steps && data.steps.length > 0) {
            let tHtml = '';
            data.steps.forEach(s => {
              tHtml += `<div class="timeline-item">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                  <h4>${s.status}</h4>
                  <p>${s.time} - ${s.date}</p>
                </div>
              </div>`;
            });
            document.getElementById('timelineList').innerHTML = tHtml;
          } else {
            document.getElementById('timelineList').innerHTML = '<p style="color: var(--text-muted);">Chưa có mốc lịch sử chi tiết.</p>';
          }
        } else {
          document.getElementById('resStatus').innerText = '❌ Không tìm thấy';
          document.getElementById('timelineList').innerHTML = `<p style="color: var(--danger);">${data.errorMessage || 'Không tìm thấy dữ liệu vận đơn.'}</p>`;
        }
      } catch (e) {
        document.getElementById('resStatus').innerText = '❌ Lỗi';
        document.getElementById('timelineList').innerHTML = '<p style="color: var(--danger);">Lỗi kết nối API tra cứu.</p>';
      }
    }
  </script>
</body>
</html>
